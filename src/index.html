<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souls - Incremental Boss Battle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Idle Screen -->
        <div id="idle-screen">
            <header class="game-header">
                <h1 class="game-title">Souls Incremental</h1>
                <p class="game-subtitle">Level up, gain souls and defeat bosses.</p>
            </header>
            
            <div class="main-stats">
                <div class="stat-box souls-display">
                    <div class="stat-label">Souls</div>
                    <div class="stat-value" id="souls-count">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Souls per Second</div>
                    <div class="stat-value" id="souls-per-second">1.0</div>
                </div>
            </div>
            
            <div class="content-grid">
                <!-- Upgrades Section -->
                <section class="upgrades-section">
                    <h2 class="section-title">Upgrades</h2>
                    <div class="upgrades-container">
                        <button class="upgrade-btn" data-upgrade="playerLevel">
                            <div class="upgrade-header">
                                <span class="upgrade-name">Player Level</span>
                                <span class="upgrade-level">Lv. <span class="upgrade-level-value">0</span></span>
                            </div>
                            <div class="upgrade-description">Increases base SPS.</div>
                            <div class="upgrade-cost-display">
                                Cost: <span class="upgrade-cost">1</span> souls
                            </div>
                        </button>
                        <button class="upgrade-btn" data-upgrade="str">
                            <div class="upgrade-header">
                                <span class="upgrade-name">Strength</span>
                                <span class="upgrade-level">Lv. <span class="upgrade-level-value">0</span></span>
                            </div>
                            <div class="upgrade-description">Increases base SPS exponentially.</div>
                            <div class="upgrade-cost-display">
                                 (Player Lv. 3 required)
                            </div>
                        </button>
                        <button class="upgrade-btn" data-upgrade="dex">
                            <div class="upgrade-header">
                                <span class="upgrade-name">Dexterity</span>
                                <span class="upgrade-level">Lv. <span class="upgrade-level-value">0</span></span>
                            </div>
                            <div class="upgrade-description">Multiplies strength effect.</div>
                            <div class="upgrade-cost-display">
                                 (Player Lv. 5 required)
                            </div>
                        </button>
                        <button class="upgrade-btn" data-upgrade="int">
                            <div class="upgrade-header">
                                <span class="upgrade-name">Intelligence</span>
                                <span class="upgrade-level">Lv. <span class="upgrade-level-value">0</span></span>
                            </div>
                            <div class="upgrade-description">Amplifies strength and dexterity effects.</div>
                            <div class="upgrade-cost-display">
                                 (Player Lv. 10 required)
                            </div>
                        </button>
                    </div>
                </section>
                
                <!-- Controls -->
                <section class="stats-section">
                    <div class="controls">
                        <button id="gain-souls-btn" class="control-btn">+100 Souls (Debug)</button>
                        <button id="save-btn" class="control-btn">Save Game</button>
                        <button id="reset-btn" class="control-btn danger">Reset Progress</button>
                    </div>
                </section>
            </div>
        </div>
        
    </div>
    
    <!-- Scripts -->
    <script src="state.js"></script>
    <script src="idleSystem.js"></script>
    <script src="game.js"></script>
</body>
</html>
